name: Type check

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Mypy
        run: uv run mypy src/
